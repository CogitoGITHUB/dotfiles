[pyprland]
plugins = ["scratchpads", "stash", "expose", "toggle_special"]

[scratchpads.term]
command = "wezterm start --class wezterm-scratch"
class = "wezterm-scratch"
size = "100% 100%"
animation = ""

[stash]
# Windows parked with pypr stash <name> are hidden and recalled later
# Use: pypr stash add, pypr stash show, pypr stash hide, pypr stash toggle

[toggle_special]
# Generic scratchpad for any app — use: pypr toggle_special <class>
# Example: pypr toggle_special emacs
