animations {
    enabled = yes

    # ── Bézier curves ──────────────────────────────────────────────
    bezier = cinema,    0.25, 0.46, 0.45, 0.94
    bezier = weight,    0.34, 1.26, 0.64, 1
    bezier = snappy,    0.23, 1,    0.32, 1
    bezier = exit,      0.55, 0,    1,    0.45
    bezier = momentum,  0.16, 1,    0.3,  1

    # ── Global fallback ────────────────────────────────────────────
    animation = global,        1,  4,    cinema

    # ── Border ─────────────────────────────────────────────────────
    animation = border,        1,  8,    cinema

    # ── Windows ────────────────────────────────────────────────────
    animation = windows,       1,  3.5,  weight,   slide
    animation = windowsIn,     1,  3.5,  weight,   slide
    animation = windowsOut,    1,  2,    exit,     slide
    animation = windowsMove,   1,  3,    cinema,   slide

    # ── Fade ───────────────────────────────────────────────────────
    animation = fade,          1,  3.5,  cinema
    animation = fadeIn,        1,  4,    cinema
    animation = fadeOut,       1,  2,    exit

    # ── Layers ─────────────────────────────────────────────────────
    animation = layers,        1,  3,    cinema,   slide
    animation = layersIn,      1,  3,    weight,   slide
    animation = layersOut,     1,  1.8,  exit,     slide
    animation = fadeLayersIn,  1,  3.5,  cinema
    animation = fadeLayersOut, 1,  1.8,  exit

    # ── Workspaces ─────────────────────────────────────────────────
    animation = workspaces,    1,  4,    momentum, slidefade 20%
    animation = workspacesIn,  1,  4,    momentum, slidefade 20%
    animation = workspacesOut, 1,  2.5,  exit,     slidefade 20%

    # ── Zoom (scrolling layout) ────────────────────────────────────
    animation = zoomFactor,    1,  4,    cinema
}