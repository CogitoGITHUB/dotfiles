music_directory "/home/aoeu/Music"
playlist_directory "/home/aoeu/.mpd/playlists"
db_file "/home/aoeu/.mpd/tag_cache"
state_file "/home/aoeu/.mpd/state"
sticker_file "/home/aoeu/.mpd/sticker.sql"

bind_to_address "127.0.0.1"
port "6600"

audio_output {
    type "fifo"
    name "my_fifo"
    path "/tmp/mpd.fifo"
    format "44100:16:2"
}

audio_output {
    type "pulse"
    name "pulse"
    server "/var/run/pulse/native"
}

mixer_type "software"
