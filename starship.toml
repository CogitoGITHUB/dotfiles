# Clean + Aggressive Dark Red Starship - Single Line (Fixed)
add_newline = false
command_timeout = 800

format = "$directory$git_branch$git_status$cmd_duration$status$character"

# Prompt character - sharp and dominant
[character]
success_symbol = "[❯](bold #8B0000)"
error_symbol = "[❯](bold #FF1A1A)"
vimcmd_symbol = "[❮](bold #8B0000)"

# Directory - bold deep crimson
[directory]
style = "bold #C8102E"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
format = "[$path]($style) "

# Git branch - bright blood red
[git_branch]
symbol = " "
style = "bold #E30613"
format = "[$symbol$branch]($style) "

# Git status - minimal & aggressive (symbols fixed with single quotes)
[git_status]
style = "#FF3333"
format = '([$all_status]($style)) '
conflicted = '⚔'
ahead = '↑'
behind = '↓'
diverged = '↕'
untracked = '?'
stashed = '↪'
modified = '\~'
staged = '[+](#8B0000)'
renamed = '»'
deleted = '✘'

# Command duration - only when slow
[cmd_duration]
min_time = 1500
format = "[ $duration](#FF3333)"
style = "#FF3333"

# Exit status on failure
[status]
style = "bold #FF1A1A"
symbol = "✘ "
format = "[$symbol$status]($style) "
disabled = false