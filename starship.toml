# ~/.config/starship.toml
# AeonCore — pure black text on white background

# Core layout
format = """
$directory$git_branch$git_status$cmd_duration$line_break$character
"""
add_newline = true

# ===========================================
# PALETTE
# ===========================================
[palettes.monochrome]
text = "black"
muted = "black"
highlight = "black"
success = "black"
error = "black"

palette = "monochrome"

# ===========================================
# CHARACTER
# ===========================================
[character]
success_symbol = "[>](black)"
error_symbol = "[x](black)"
vicmd_symbol = "[<](black)"
format = "$symbol "

# ===========================================
# DIRECTORY
# ===========================================
[directory]
style = "black"
truncation_length = 3
truncation_symbol = "~/"
read_only = " (ro)"
format = "[$path]($style) "

# ===========================================
# GIT BRANCH
# ===========================================
[git_branch]
symbol = ""
style = "black"
format = "($branch) "

# ===========================================
# GIT STATUS
# ===========================================
[git_status]
style = "black"
format = "[$all_status]($style) "

# ===========================================
# COMMAND DURATION
# ===========================================
[cmd_duration]
min_time = 200
style = "black"
format = "[$duration]($style) "
