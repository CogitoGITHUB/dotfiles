"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
scan_timeout = 10

format = """
$status$username${hostname}:${directory} 
$character
"""

[status]
disabled = false
format = "[$symbol]($style)"
symbol = "ERROR       "
success_symbol = "OK     "
style = "bold red"
success_style = "bold black"

[username]
show_always = true
style_user = "bold black"
style_root = "bold red"

[hostname]
format = "[$hostname]($style)"
style = "bold black"
trim_at = "."

[directory]
format = "[$path]($style)"
style = "bold black"
truncation_length = 3
truncation_symbol = "../"

[character]
success_symbol = ">"
error_symbol = "!"
vicmd_symbol = "<"
