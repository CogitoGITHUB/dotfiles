# Multi-line Structured — Dark Red #8B0000
add_newline = false
command_timeout = 800

format = """
 $username $hostname $directory
$git_branch$git_status$cmd_duration
 • $character"""

# Directory — breadcrumb path in dark red
[directory]
style = "bold #8B0000"
format = "[$path]($style)"
truncation_length = 4
truncation_symbol = ""
home_symbol = "home"

# Git branch — slightly dimmer red
[git_branch]
symbol = " "
style = "bold #8B0000"
format = "[$symbol$branch]($style) "

# Git status — labeled counts, separated by dim │
[git_status]
style = "#8B0000"
format = '([│](#3d0000) [$ahead_behind](#6b0000)[│](#3d0000) [$all_status](#6b0000) )'
conflicted  = "⚔ "
ahead       = "↑$count ahead "
behind      = "↓$count behind "
diverged    = "↕ diverged "
untracked   = "? untracked "
stashed     = "↪ stashed "
modified    = "~$count modified "
staged      = "+$count staged "
renamed     = "» renamed "
deleted     = "✘ deleted "

# Command duration — dim, separated by │
[cmd_duration]
min_time = 200
style = "#3d0000"
format = "[│](#3d0000) [⏱ $duration](#3d0000) "

# Optional language versions (only show when in a project)
[nodejs]
format = "[│](#3d0000) [node $version](#3d0000) "
symbol = ""

[python]
format = "[│](#3d0000) [py $version](#3d0000) "
symbol = ""

[rust]
format = "[│](#3d0000) [rs $version](#3d0000) "
symbol = ""

# Prompt character
[character]
success_symbol = "[❯](bold #8B0000)"
error_symbol   = "[❯](bold #8B0000)"
vimcmd_symbol  = "[❮](bold #8B0000)"

# Disable modules not in use
[package]
disabled = true

[username]
disabled = false
style_user = "#8B0000"
style_root = "bold #8B0000"
format = "[$user]($style)[@](#3d0000)"
show_always = true

[hostname]
disabled = false
style = "#6b0000"
format = "[$hostname](#6b0000) "
ssh_only = false