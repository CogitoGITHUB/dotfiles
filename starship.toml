# Clean + Dark Red Starship - Single Line
add_newline = false
command_timeout = 800

format = "$directory$git_branch$git_status$cmd_duration$status$character"

# Prompt character - dark red
[character]
success_symbol = "[❯](bold #8B0000)"
error_symbol = "[❯](bold #8B0000)"
vimcmd_symbol = "[❮](bold #8B0000)"

# Directory - dark red
[directory]
style = "bold #8B0000"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
format = "[$path]($style) "

# Git branch - dark red
[git_branch]
symbol = " "
style = "bold #8B0000"
format = "[$symbol$branch]($style) "

# Git status - dark red
[git_status]
style = "#8B0000"
format = '([$all_status]($style)) '
conflicted = '⚔'
ahead = '↑'
behind = '↓'
diverged = '↕'
untracked = '?'
stashed = '↪'
modified = '~'
staged = '[+](#8B0000)'
renamed = '»'
deleted = '✘'

# Command duration - dark red
[cmd_duration]
min_time = 1500
format = "[ $duration](#8B0000)"
style = "#8B0000"

# Exit status on failure
[status]
style = "bold #8B0000"
symbol = "✘ "
format = "[$symbol$status]($style) "
disabled = false
