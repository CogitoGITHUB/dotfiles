# Advanced Dark Red Starship Config
add_newline = false
command_timeout = 800

format = """
 $username$hostname$directory$git_branch$git_status
$jobs$cmd_duration
 • $character"""

right_format = """$time$battery$memory_usage"""

# ── Directory ──────────────────────────────────────────────
[directory]
style = "bold #8B0000"
format = "[ 󰉋 $path]($style) "
truncation_length = 4
truncation_symbol = "…/"
home_symbol = "~"
read_only = " 󰌾"
read_only_style = "#3D0000"

# ── Git Branch ─────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold #8B0000"
format = "[│](#3D0000) [$symbol$branch]($style) "

# ── Git Status ─────────────────────────────────────────────
[git_status]
style = "#6B0000"
format = '([$ahead_behind]($style) [$all_status](#6B0000) )'
conflicted  = "⚔ "
ahead       = "↑$count "
behind      = "↓$count "
diverged    = "↕ "
untracked   = "? "
stashed     = "↪ "
modified    = "~$count "
staged      = "+$count "
renamed     = "» "
deleted     = "✘ "

# ── Jobs ───────────────────────────────────────────────────
[jobs]
symbol = "󰒓 "
style = "#8B0000"
format = "[$symbol$number]($style) "
number_threshold = 1

# ── Command Duration ───────────────────────────────────────
[cmd_duration]
min_time = 200
style = "#3D0000"
format = "[│](#3D0000) [⏱ $duration]($style) "

# ── Character ──────────────────────────────────────────────
[character]
success_symbol = "[❯](bold #8B0000)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold #8B0000)"

# ── Username ───────────────────────────────────────────────
[username]
disabled = false
style_user = "#8B0000"
style_root = "bold red"
format = "[$user]($style)[](#3D0000) "
show_always = true

# ── Hostname ───────────────────────────────────────────────
[hostname]
disabled = false
style = "#6B0000"
format = "[$hostname]($style) [│](#3D0000) "
ssh_only = false

# ── Time (right prompt) ────────────────────────────────────
[time]
disabled = false
style = "#3D0000"
format = "[│](#1A0000) [ $time]($style) "
time_format = "%H:%M"
use_12hr = false

# ── Battery (right prompt) ─────────────────────────────────
[battery]
full_symbol     = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
unknown_symbol  = "󰁽 "
empty_symbol    = "󰂎 "
format = "[│](#1A0000) [$symbol$percentage]($style) "

[[battery.display]]
threshold = 15
style = "bold red"

[[battery.display]]
threshold = 50
style = "#6B0000"

[[battery.display]]
threshold = 100
style = "#3D0000"

# ── Memory (right prompt) ──────────────────────────────────
[memory_usage]
disabled = false
symbol = "󰍛 "
style = "#3D0000"
format = "[│](#1A0000) [$symbol$ram]($style) "
threshold = 0