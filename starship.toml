# ~/.config/starship.toml
# AeonCore ‚Äî Tensegrity Column Style
# Black text, white void, vertical compression

# Core layout: vertical stacked segments as structural beams
format = """
$directory$line_break\
$git_branch$git_status$line_break\
$cmd_duration$line_break\
$character
"""

add_newline = true

############################################
# PALETTE
############################################
[palettes.monochrome]
text = "black"
muted = "black"
highlight = "black"
success = "black"
error = "black"

palette = "monochrome"

############################################
# CHARACTER
############################################
[character]
success_symbol = "[‚ñê](black)"
error_symbol = "[‚ñà](black)"
vicmd_symbol = "[‚ñå](black)"
format = "$symbol "

############################################
# DIRECTORY
############################################
[directory]
style = "black"
truncation_length = 3
truncation_symbol = "‚Ä¶/"
read_only = " !ro"
format = "$path "

############################################
# GIT BRANCH
############################################
[git_branch]
symbol = ""
style = "black"
format = "$branch "

############################################
# GIT STATUS
############################################
[git_status]
style = "black"
format = "$all_status "

############################################
# COMMAND DURATION
############################################
[cmd_duration]
min_time = 250
style = "black"
format = "$duration "
