### TPM
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-resurrect'
#https://github.com/tmux-plugins/tmux-resurrect.git


#set -g @plugin 'schasse/tmux-jump'
#https://github.com/schasse/tmux-jump.git

#set -g @plugin 'fcsonline/tmux-thumbs'
#set -g @thumbs-key F
#set -g @thumbs-alphabet dvorak-homerow
#https://github.com/fcsonline/tmux-thumbs.git



set -g @plugin 'tardunge/tmux-gh'
#set-option -g status-right '#{tmux_gh_uname}'
set -g status-right "#{tmux_gh_uname} | %Y-%m-%d %H:%M"

set -g @plugin 'whame/tmux-modal'
# https://github.com/whame/tmux-modal.git


run '~/.config/tmux/plugins/tpm/tpm'

### PREFIX
unbind C-b                # remove original prefix
set -g prefix C-Space     # set new prefix to Ctrl-Space
bind C-Space send-prefix


### Dvorak movement keys (prefix + h/t/n/s)
bind h select-pane -L
bind t select-pane -D
bind n select-pane -U
bind s select-pane -R

### Resize panes with Shift + movement keys
bind -n S-h resize-pane -L 5
bind -n S-t resize-pane -D 5
bind -n S-n resize-pane -U 5
bind -n S-s resize-pane -R 5


bind -n C-h previous-window
bind -n C-s next-window

bind l split-window -v     # vertical split (stack)
bind r split-window -h     # horizontal split (side-by-side)


bind x kill-pane
bind X kill-window


bind r source-file ~/.config/tmux/tmux.conf \; display-message "TMUX reloaded"


### STATUS BAR — top + transparent
set -g status-position top
set -g status on
set -g status-justify centre

# Transparency / minimal look
set -g status-style "bg=default,fg=#cccccc"


### PANE BORDERS
set -g pane-border-style "fg=#666666"
set -g pane-active-border-style "fg=#ffffff"

# Pane border format, displayed at top of each pane
set -g pane-border-status top
set -g pane-border-format " #P "

set -g status-style "bg=default,fg=black"
set -g message-style "bg=default,fg=black"
set -g message-command-style "bg=default,fg=black"

