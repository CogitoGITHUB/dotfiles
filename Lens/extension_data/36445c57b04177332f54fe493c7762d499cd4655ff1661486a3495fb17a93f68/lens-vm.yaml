cpus: 2
memory: 2GiB
disk: 50GiB
env:
  K0S_VERSION: v1.26.2+k0s.0
images:
- location: https://downloads.k8slens.dev/lens-local-vm-images/lens-vm-ad6d393.amd64.qcow2
  arch: x86_64
  digest: sha512:9208cc2fd7903ed7efc9db9201e703bfdda29d2e375b39020a1da3247f20f92cf4be20f8ef04f0b9e429e27e7f650b0628afb536835c9a82e42aaaba18e17e18
- location: https://downloads.k8slens.dev/lens-local-vm-images/lens-vm-ad6d393.arm64.qcow2
  arch: aarch64
  digest: sha512:f3cad08098627b9bb844eecbd6e4d78a2c89a871b1bfedef02029e3479e380f292af43c72989855a0aa30a5779ffaff8f72b40fbc826b82d8077b78fb9ad02de
containerd:
  system: false
  user: false
provision:
- mode: system
  script: |
    #!/bin/bash
    # Increase default max_user_watches from 8192 to help with development environments with many file watches
    echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf && sudo sysctl -p
- mode: system
  script: |
    #!/bin/bash
    set -eux -o pipefail

    if [ -f /etc/systemd/system/k0scontroller.service ]
    then
      find /var/lib/k0s/ -maxdepth 2 -type f -size 0 -a ! -name 'state.db*' | xargs rm || true
      exit 0
    fi

    if [ "$(/usr/local/bin/k0s version)" != "${K0S_VERSION}" ]
    then
      curl -sSfL --retry 5 https://get.k0s.sh | K0S_VERSION=${K0S_VERSION} sh
    fi

    k0s install controller --single \
      --config /etc/k0s.yaml \
      --cri-socket remote:unix:///var/run/cri-dockerd.sock \
      --kubelet-extra-args="--cgroup-driver=systemd --hostname-override=lens-desktop-kube"
    k0s start

    if ! timeout 30s bash -c "until k0s kc get nodes >/dev/null 2>&1; do sleep 3; done"; then
      echo >&2 "k0s control plane failed to start"
      exit 1
    fi

    k0s kc apply -f /etc/k0s/manifests/
probes:
- script: |
    #!/bin/bash
    set -eux -o pipefail

    if ! timeout 30s bash -c "until sudo docker ps >/dev/null 2>&1; do sleep 3; done"; then
      echo >&2 "docker is not yet running"
      exit 1
    fi
  description: probe docker
- script: |
    #!/bin/bash
    set -eux -o pipefail
    if ! timeout 30s bash -c "until sudo k0s kc get nodes >/dev/null 2>&1; do sleep 3; done"; then
      echo >&2 "k0s is not yet running"
      exit 1
    fi
  description: probe k0s
- script: |
    #!/bin/bash
    set -eux -o pipefail

    if ! timeout 30s bash -c "until pgrep dockerd >/dev/null 2>&1; do sleep 3; done"; then
      echo >&2 "docker is not yet running"
      exit 1
    fi

    sudo chmod 0666 /var/run/docker.sock

    gunzip -c /var/lib/k0s/binfmt.tar.gz | sudo docker image load
    if [ "$(arch)" = "aarch64" ]
    then
      sudo docker run --rm --privileged tonistiigi/binfmt:qemu-v6.2.0 --install amd64
    else
      sudo docker run --rm --privileged tonistiigi/binfmt:qemu-v6.2.0 --install arm64
    fi
  description: probe docker process
portForwards:
- guestPort: 10257
  ignore: true
- guestPort: 10259
  ignore: true
- guestPort: 10250
  ignore: true
- guestPort: 10249
  ignore: true
- guestPort: 8080
  ignore: true
- guestPort: 179
  ignore: true
- guestSocket: /var/run/docker.sock
  hostSocket: "{{.Dir}}/../docker.sock"
message: |
  To run `docker` on the host (assumes docker-cli is installed), run the following commands:
  ------
  docker context create lens-vm --docker "host=unix://~/.k8slens/lima/docker.sock"
  docker context use lens-vm
  docker run hello-world
  ------
